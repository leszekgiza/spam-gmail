name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefix apps/web
      - run: npx --prefix apps/web next build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r apps/web/api/requirements.txt
      - run: python -m compileall apps/api apps/web/api packages scripts
